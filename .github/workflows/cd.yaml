name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.2"

      - name: Deploy to K8s
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          helm upgrade --install docpilot ./helm/docpilot \
            --namespace docpilot --create-namespace \
            --set api.image.tag=${{ github.sha }} \
            --set secrets.OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --set secrets.POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --set secrets.JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}

      - name: Health check
        run: |
          sleep 15
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=api \
            --namespace docpilot --timeout=120s
          kubectl port-forward svc/docpilot-api 8000:8000 --namespace docpilot &
          sleep 3
          curl -sf http://localhost:8000/health || exit 1
          kill %1