name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check app/
      - run: mypy app/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: |
          if [ -d tests ] && [ "$(ls -A tests/ 2>/dev/null)" ]; then
            pytest tests/ -v --timeout=60
          else
            echo "No tests found — skipping"
          fi

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t docpilot-api:ci .
      - run: |
          docker run -d --name docpilot-temp docpilot-api:ci sleep 30
          docker exec docpilot-temp python -c "import uvicorn; print('OK')"
          docker kill docpilot-temp