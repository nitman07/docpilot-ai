apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docpilot-qdrant-pvc
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClass }}
  resources:
    requests:
      storage: {{ .Values.qdrant.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docpilot-qdrant
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/component: qdrant
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image }}
          ports:
            - containerPort: 6333
              protocol: TCP
              name: http
            - containerPort: 6334
              protocol: TCP
              name: grpc
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: docpilot-qdrant-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docpilot-qdrant
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  ports:
    - port: 6333
      targetPort: 6333
      protocol: TCP
      name: http
    - port: 6334
      targetPort: 6334
      protocol: TCP
      name: grpc
  selector:
    app.kubernetes.io/component: qdrant