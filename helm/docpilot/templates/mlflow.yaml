apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docpilot-mlflow-pvc
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClass }}
  resources:
    requests:
      storage: {{ .Values.mlflow.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docpilot-mlflow
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mlflow
    spec:
      containers:
        - name: mlflow
          image: {{ .Values.mlflow.image }}
          ports:
            - containerPort: 5000
              protocol: TCP
          args:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --backend-store-uri
            - sqlite:///mlflow_data/mlflow.db
            - --default-artifact-root
            - /mlflow_data/artifacts
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow_data
      volumes:
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: docpilot-mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docpilot-mlflow
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: mlflow
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: mlflow