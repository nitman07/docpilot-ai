apiVersion: v1
kind: Secret
metadata:
  name: docpilot-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.OPENAI_API_KEY | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.POSTGRES_PASSWORD | default "" | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.REDIS_PASSWORD | default "" | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.QDRANT_API_KEY | default "" | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.JWT_SECRET_KEY | default (randAlphaNum 32) | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.ADMIN_PASSWORD | default "admin123" | quote }}