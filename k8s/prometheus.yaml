apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: docpilot
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: docpilot-api
        static_configs:
          - targets:
              - docpilot-api:8000
        metrics_path: /metrics
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docpilot-prometheus-pvc
  namespace: docpilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docpilot-prometheus
  namespace: docpilot
  labels:
    app: docpilot-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docpilot-prometheus
  template:
    metadata:
      labels:
        app: docpilot-prometheus
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: prometheus
          image: prom/prometheus:v3.0.0
          ports:
            - containerPort: 9090
              protocol: TCP
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: docpilot-prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docpilot-prometheus
  namespace: docpilot
  labels:
    app: docpilot-prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: docpilot-prometheus