apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docpilot-postgres-pvc
  namespace: docpilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docpilot-postgres
  namespace: docpilot
  labels:
    app: docpilot-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docpilot-postgres
  template:
    metadata:
      labels:
        app: docpilot-postgres
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: docpilot-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docpilot-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: docpilot-config
                  key: POSTGRES_DB
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - docpilot
                - -d
                - docpilot
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - docpilot
                - -d
                - docpilot
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: docpilot-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docpilot-postgres
  namespace: docpilot
  labels:
    app: docpilot-postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: docpilot-postgres