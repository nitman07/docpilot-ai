apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docpilot-redis-pvc
  namespace: docpilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docpilot-redis
  namespace: docpilot
  labels:
    app: docpilot-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docpilot-redis
  template:
    metadata:
      labels:
        app: docpilot-redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: docpilot-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docpilot-redis
  namespace: docpilot
  labels:
    app: docpilot-redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: docpilot-redis