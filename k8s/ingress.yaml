apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docpilot-ingress
  namespace: docpilot
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: docpilot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docpilot-api
                port:
                  number: 8000
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: docpilot-grafana
                port:
                  number: 3000